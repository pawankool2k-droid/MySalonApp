name: Configure Pages Action Test

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - uses: actions/configure-pages@v4
        with:
          enablement: 'true'
      - run: echo "Configure Pages step completed"
